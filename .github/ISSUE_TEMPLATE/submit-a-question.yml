name: Submit a Question
description: Technical Questions
title: '[Question]: '
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > *This should NOT be used for general questions on use of MapTool*
        >
        > For user support, please post your question in one of these places:
        > - [RPTools.net forums](https://forums.rptools.net)
        > - [MapTool Discord server](https://discord.gg/dZy7HeYYVY)
        > - [r/MapTool subreddit](https://www.reddit.com/r/MapTool/)
  - type: textarea
    attributes:
      label: Your Question
      description: A clear and concise question regarding this Fork, how to contribute, or similar topics.
    validations:
      required: true